# Real client IP is set by cloudflare.conf (CF-Connecting-IP via cloudflared).
# Empty keys are not counted by limit_req — GET/HEAD bypass the zone.
map $request_method $auth_login_limit_key {
    default $binary_remote_addr;
    GET     "";
    HEAD    "";
}

map $request_method $auth_register_limit_key {
    default $binary_remote_addr;
    GET     "";
    HEAD    "";
}

limit_req_zone $auth_login_limit_key zone=auth_login:10m rate=5r/m;
limit_req_zone $auth_register_limit_key zone=auth_register:10m rate=5r/m;

# Shared site-wide cap for auth POST traffic (all clients combined).
map $request_method $auth_post_global_limit_key {
    default "global";
    GET     "";
    HEAD    "";
}

limit_req_zone $auth_post_global_limit_key zone=auth_post_global:10m rate=30r/m;

limit_req_status 429;
