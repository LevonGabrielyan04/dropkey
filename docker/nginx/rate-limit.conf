# Real client IP is set by cloudflare.conf (CF-Connecting-IP via cloudflared).
# Empty keys are not counted by limit_req — GET/HEAD bypass the zone.
# Login and register share one per-IP budget (5 requests/min combined).
# Note: stock nginx only supports r/s and r/m (not per-hour units).
map $request_method $auth_limit_key {
    default $binary_remote_addr;
    GET     "";
    HEAD    "";
}

limit_req_zone $auth_limit_key zone=auth:10m rate=5r/m;

# Shared site-wide cap for auth POST traffic (all clients combined).
map $request_method $auth_post_global_limit_key {
    default "global";
    GET     "";
    HEAD    "";
}

limit_req_zone $auth_post_global_limit_key zone=auth_post_global:10m rate=15r/s;

limit_req_status 429;
