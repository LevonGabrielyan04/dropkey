server {
    # Localhost for healthchecks and dev port publish (127.0.0.1:8080 on the host).
    listen 127.0.0.1:8080;
    listen [::1]:8080;
    # Tunnel network only — cloudflared origin (see docker-compose.yml tunnel subnet).
    listen 172.30.200.2:8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 12M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /login {
        limit_req zone=auth_post_global;
        limit_req zone=auth burst=2 nodelay;
        limit_req zone=auth_hourly burst=2 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /register {
        limit_req zone=auth_post_global;
        limit_req zone=auth burst=2 nodelay;
        limit_req zone=auth_hourly burst=2 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.png { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Laravel Reverb — WebSocket (/app) and HTTP API (/apps) on the internal server port.
    location ~ ^/(app|apps) {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:8081;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        include /etc/nginx/conf.d/proxy-forwarded.conf;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
