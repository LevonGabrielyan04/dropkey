[PHP]
expose_php = Off
display_errors = Off
log_errors = On
memory_limit = 256M
; Unlimited for CLI long-runners (reverb, queue, pulse:check, scheduler).
; FPM overrides this via php_admin_value in www.conf.
max_execution_time = 0
upload_max_filesize = 10M
post_max_size = 12M

[Date]
date.timezone = UTC

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
